# Coverity on Polaris (COP) capture/analyze configuration for BN-demo-java.
# Consumed by the Polaris/Coverity CLI (`polaris` or `cov-capture`) during the pipeline scan step.
capture:
  build:
    cleanCommands:
      - shell: [mvn, -B, -f, pom.xml, clean]
    buildCommands:
      - shell: [mvn, -B, -f, pom.xml, install, -DskipTests]
  files:
    exclude-regex: (target|\.git)/.*
  languages:
    include: [java]
analyze:
  mode: central
  coverity:
    cov-analyze:
      - "--webapp-security"
      - "--security"
      - "--enable"
      - "HARDCODED_CREDENTIALS"
      - "--enable"
      - "SQLI"
      - "--enable"
      - "OS_CMD_INJECTION"
install:
  coverity:
    version: default
